<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photodex</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animals.css">
</head>
<body>
    <script src="js/navbar.js"></script>

   <main>
    <section id="progress-bar">

    </section>
    <script type="module" src="js/objectives.js"></script>
       
       
    <section class="carousel-section">
        <div class="container">
            <h1>Catégories</h1>
            <div class="carousel-container">
                <div class="carousel" id="carousel">
                    <div class="carousel-item">
                        <a href="birds.html" style="display: block; width: 100%; height: 100%; text-decoration: none; position: relative;">
                            <img src="images/birds/generic-birds.jpg" alt="Oiseaux" style="width: 100%; height: 100%; object-fit: cover;">
                            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold;">Oiseaux</div>
                        </a>
                    </div>
                    <div class="carousel-item">
                        <a href="mammals.html" style="display: block; width: 100%; height: 100%; text-decoration: none; position: relative;">
                            <img src="images/mammals/generic-mammals.jpg" alt="Mammifères" style="width: 100%; height: 100%; object-fit: cover;">
                            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold;">Mammifères</div>
                        </a>
                    </div>
                    <div class="carousel-item">
                        <a href="insects.html" style="display: block; width: 100%; height: 100%; text-decoration: none; position: relative;">
                            <img src="images/insects/generic-insects.jpg" alt="Insectes" style="width: 100%; height: 100%; object-fit: cover;">
                            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold;">Insectes</div>
                        </a>
                    </div>
                  
                    <div class="carousel-item">
                        <a href="reptiles.html" style="display: block; width: 100%; height: 100%; text-decoration: none; position: relative;">
                            <img src="images/reptiles/generic-reptiles.jpg" alt="Reptiles & Amphibiens" style="width: 100%; height: 100%; object-fit: cover;">
                            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 15px 25px; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold;">Reptiles & Amphibiens</div>
                        </a>
                    </div>
                </div>
                <button class="carousel-btn prev" onclick="prevSlide()">❮</button>
                <button class="carousel-btn next" onclick="nextSlide()">❯</button>
            </div>
        </div>
    </section>
    <script src="js/carrouselbis.js"></script>

       
    <section id="featured-container">
        <div class="featured-card">
            <h2>Dernière trouvaille</h2>
            <div id="last-photo">
              
            </div>
        </div>

        <div class="featured-card">
            <h2>Highlight aléatoire</h2>
            <div id="random-highlight">
                
            </div>
        </div>
    </section>
    <script type="module" src="js/highlights.js"></script>
       

    <section class="cta">
        <div class="container">
            <a href="contact.html" class="btn btn-primary">Me contacter</a>
        </div>
    </section>
</main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Photodex. Tous droits réservés.</p>
        </div>
    </footer>
